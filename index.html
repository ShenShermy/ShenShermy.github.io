    section { min-height:100vh; padding:7rem 4rem 5rem; max-width:1200px; margin:0 auto; }
    .section-label { font-family:var(--mono); font-size:0.72rem; color:var(--accent); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.6rem; }
    h2.section-title { font-size:clamp(2rem,4vw,3rem); font-weight:800; line-height:1.1; margin-bottom:3rem; }

    /* ── HERO ── */
    #home { display:flex; flex-direction:column; justify-content:center; position:relative; }
    #home::after { content:''; position:absolute; inset:0; pointer-events:none;
      background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
      background-size:60px 60px; }
    .hero-eyebrow { font-family:var(--mono); font-size:0.8rem; color:var(--accent); letter-spacing:0.25em; text-transform:uppercase; margin-bottom:1.4rem; animation:fadeUp 0.8s ease both; }
    .hero-name { font-size:clamp(3.5rem,8vw,7rem); font-weight:800; line-height:0.95; letter-spacing:-0.02em; animation:fadeUp 0.8s 0.1s ease both; }
    .hero-name span { display:block; background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-headline { font-size:clamp(1rem,2vw,1.25rem); color:var(--dim); max-width:560px; margin:1.6rem 0 2.4rem; line-height:1.7; animation:fadeUp 0.8s 0.2s ease both; }
    .hero-headline strong { color:var(--text); }
    .hero-tags { display:flex; flex-wrap:wrap; gap:0.6rem; animation:fadeUp 0.8s 0.3s ease both; }
    .tag { font-family:var(--mono); font-size:0.72rem; letter-spacing:0.06em; padding:0.3rem 0.85rem; border-radius:2px; border:1px solid; }
    .tag-blue   { border-color:var(--accent);  color:var(--accent);  background:rgba(0,229,255,0.06); }
    .tag-purple { border-color:var(--accent2); color:var(--accent2); background:rgba(123,97,255,0.06); }
    .tag-red    { border-color:var(--accent3); color:var(--accent3); background:rgba(255,107,107,0.06); }

    /* ── ABOUT ── */
    #about { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:start; }
    .about-bio { font-size:1rem; line-height:1.8; color:var(--dim); margin-bottom:1.1rem; }
    .about-bio strong { color:var(--text); }
    .edu-card { border:1px solid var(--border); border-left:3px solid var(--accent); background:var(--card); padding:1.2rem 1.4rem; margin-bottom:1rem; border-radius:0 4px 4px 0; }
    .edu-school { font-weight:700; font-size:0.95rem; margin-bottom:0.2rem; }
    .edu-degree { font-family:var(--mono); font-size:0.75rem; color:var(--dim); margin-bottom:0.15rem; }
    .edu-period { font-family:var(--mono); font-size:0.72rem; color:var(--accent); }
    .strengths-list { list-style:none; margin-top:1.5rem; }
    .strengths-list li { display:flex; align-items:flex-start; gap:0.75rem; padding:0.7rem 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.93rem; line-height:1.55; }
    .strengths-list li::before { content:'→'; color:var(--accent); font-family:var(--mono); font-size:0.85rem; flex-shrink:0; margin-top:0.05rem; }

    /* ── SKILLS ── */
    .skills-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; }
    .skill-category { border:1px solid var(--border); background:var(--card); padding:1.8rem; border-radius:4px; transition:border-color 0.25s,transform 0.25s; }
    .skill-category:hover { border-color:var(--accent); transform:translateY(-3px); }
    .skill-cat-label { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:1.2rem; padding-bottom:0.7rem; border-bottom:1px solid var(--border); }
    .skill-item { display:flex; justify-content:space-between; align-items:center; padding:0.45rem 0; font-size:0.88rem; color:var(--dim); border-bottom:1px solid rgba(255,255,255,0.03); }
    .skill-item:last-child { border-bottom:none; }
    .skill-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); flex-shrink:0; }

    /* ── PROJECTS ── */
    .projects-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    .project-card { border:1px solid var(--border); background:var(--card); padding:2rem; border-radius:4px; transition:border-color 0.25s,transform 0.25s; position:relative; overflow:hidden; }
    .project-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity 0.3s; }
    .project-card:hover { border-color:rgba(0,229,255,0.35); transform:translateY(-4px); }
    .project-card:hover::before { opacity:1; }
    .project-card.featured { grid-column:1 / -1; }
    .project-type { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.14em; color:var(--accent2); text-transform:uppercase; margin-bottom:0.6rem; }
    .project-title { font-size:1.2rem; font-weight:700; margin-bottom:0.3rem; }
    .project-period { font-family:var(--mono); font-size:0.72rem; color:var(--dim); margin-bottom:1.2rem; }
    .project-section { margin-bottom:0.9rem; }
    .proj-sec-title { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:0.3rem; }
    .project-section p { font-size:0.87rem; color:var(--dim); line-height:1.65; }
    .feat-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    .project-tech-row { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:1.2rem; align-items:center; }
    .tech-pill { font-family:var(--mono); font-size:0.68rem; padding:0.2rem 0.6rem; background:rgba(123,97,255,0.1); border:1px solid rgba(123,97,255,0.25); border-radius:2px; color:var(--accent2); }
    .proj-link { color:var(--accent); font-family:var(--mono); font-size:0.72rem; margin-left:auto; text-decoration:none; }

    /* ── RESUME ── */
    .resume-block { border:1px solid var(--border); background:var(--card); border-radius:4px; overflow:hidden; margin-bottom:2rem; }
    .resume-block-hdr { font-family:var(--mono); font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); padding:0.9rem 1.6rem; background:rgba(0,229,255,0.05); border-bottom:1px solid var(--border); }
    .resume-entry { padding:1.2rem 1.6rem; border-bottom:1px solid rgba(255,255,255,0.04); display:grid; grid-template-columns:1fr auto; gap:1rem; }
    .resume-entry:last-child { border-bottom:none; }
    .resume-role { font-weight:700; font-size:0.95rem; margin-bottom:0.15rem; }
    .resume-org  { font-size:0.82rem; color:var(--dim); margin-bottom:0.5rem; }
    .resume-buls { list-style:none; }
    .resume-buls li { font-size:0.83rem; color:var(--dim); line-height:1.6; padding-left:1rem; position:relative; margin-bottom:0.25rem; }
    .resume-buls li::before { content:'▸'; position:absolute; left:0; color:var(--accent); font-size:0.7rem; }
    .resume-period { font-family:var(--mono); font-size:0.7rem; color:var(--accent); white-space:nowrap; }
    .cv-btn { display:inline-flex; align-items:center; gap:0.6rem; padding:0.9rem 2rem; background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:var(--mono); font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; border-radius:2px; transition:background 0.2s,color 0.2s; margin-top:1rem; }
    .cv-btn:hover { background:var(--accent); color:var(--bg); }

    /* ── CONTACT ── */
    #contact { display:flex; flex-direction:column; justify-content:center; }
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-top:1rem; }
    .contact-item { display:flex; flex-direction:column; gap:0.4rem; border:1px solid var(--border); padding:1.6rem; border-radius:4px; background:var(--card); transition:border-color 0.2s; }
    .contact-item:hover { border-color:var(--accent); }
    .contact-label { font-family:var(--mono); font-size:0.68rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); }
    .contact-value { font-size:0.95rem; font-weight:600; color:var(--text); }
    .contact-value a { color:inherit; text-decoration:none; transition:color 0.2s; }
    .contact-value a:hover { color:var(--accent); }
    .contact-note { margin-top:3rem; font-size:0.85rem; color:var(--dim); border-top:1px solid var(--border); padding-top:2rem; text-align:center; line-height:1.7; }
    .contact-note strong { color:var(--text); }

    /* ── FOOTER ── */
    footer { text-align:center; padding:2rem; font-family:var(--mono); font-size:0.7rem; color:var(--dim); border-top:1px solid var(--border); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { opacity:0; transform:translateY(20px); transition:opacity 0.65s ease,transform 0.65s ease; }
    .fade-in.visible { opacity:1; transform:translateY(0); }

    /* 语言切换过渡 */
    .lang-fade { transition: opacity 0.25s ease; }
    .lang-fade.switching { opacity: 0; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--accent2); border-radius:2px; }

    /* ── RESPONSIVE ── */
    @media (max-width:900px) {
      nav { padding:1rem 1.5rem; }
      .nav-links { gap:1rem; }
      section { padding:6rem 1.5rem 4rem; }
      #about { grid-template-columns:1fr; gap:2.5rem; }
      .skills-grid { grid-template-columns:1fr; }
      .projects-grid { grid-template-columns:1fr; }
      .project-card.featured { grid-column:1; }
      .feat-grid { grid-template-columns:1fr; }
      .contact-grid { grid-template-columns:1fr; }
    }
    @media (max-width:600px) { .nav-links { display:none; } }
  </style>
</head>
<body>


<!-- ============================================================
  🧭 NAVIGATION — 顶部固定导航栏
  ============================================================
  .lang-btn → 语言切换按钮（EN ↔ 中文）
  导航文字由 JS 根据当前语言自动填充
============================================================ -->
<nav>
  <span class="nav-logo" id="nav-logo"></span>
  <ul class="nav-links" id="nav-links"></ul>          <!-- 导航项注入点 -->
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()"></button>
</nav>


<!-- ============================================================
  ① HOME — 首页 / 定位语句
  ✏️  改：CONFIG.en.heroTags / CONFIG.zh.heroTags
============================================================ -->
<section id="home">
  <p class="hero-eyebrow" id="hero-eyebrow"></p>
  <h1 class="hero-name"    id="hero-name"></h1>
  <p  class="hero-headline" id="hero-headline"></p>
  <div class="hero-tags"   id="hero-tags"></div>
</section>


<!-- ============================================================
  ② ABOUT ME — 关于我
  ✏️  改：CONFIG.[en|zh].aboutBio / strengths / education / languages
============================================================ -->
<section id="about">
  <!-- 左列：介绍 + 优势 -->
  <div class="fade-in">
    <p class="section-label" id="about-label"></p>
    <h2 class="section-title" id="about-title"></h2>
    <div id="about-bio"></div>
    <ul class="strengths-list" id="about-strengths"></ul>
  </div>
  <!-- 右列：教育 + 语言 -->
  <div class="fade-in">
    <p class="section-label" id="edu-label"></p>
    <div id="about-education"></div>
    <br/>
    <p class="section-label" id="lang-label"></p>
    <div class="edu-card" id="about-languages"></div>
  </div>
</section>


<!-- ============================================================
  ③ SKILLS — 技能展示
  ✏️  改：CONFIG.[en|zh].skillCategories
============================================================ -->
<section id="skills">
  <p class="section-label" id="skills-label"></p>
  <h2 class="section-title fade-in" id="skills-title"></h2>
  <div class="skills-grid" id="skills-grid"></div>
</section>


<!-- ============================================================
  ④ PROJECTS — 项目展示（作业核心 8/20 分）
  ✏️  改：CONFIG.[en|zh].projects（增减项目 / 编辑字段）
============================================================ -->
<section id="projects">
  <p class="section-label" id="projects-label"></p>
  <h2 class="section-title fade-in" id="projects-title"></h2>
  <div class="projects-grid" id="projects-grid"></div>
</section>


<!-- ============================================================
  ⑤ RESUME — 工作 & 实习经历
  ✏️  改：CONFIG.[en|zh].experiences + CONFIG.cvLink
============================================================ -->
<section id="resume">
  <p class="section-label" id="resume-label"></p>
  <h2 class="section-title fade-in" id="resume-title"></h2>
  <div id="resume-blocks"></div>
  <a class="cv-btn" id="cv-btn" href="#" target="_blank"></a>
  <p style="font-family:var(--mono);font-size:0.7rem;color:var(--dim);margin-top:0.6rem;" id="cv-hint"></p>
</section>


<!-- ============================================================
  ⑥ CONTACT — 联系方式
  ✏️  改：CONFIG.email / phone / github / linkedin / [en|zh].contactLabels
============================================================ -->
<section id="contact">
  <p class="section-label" id="contact-label"></p>
  <h2 class="section-title fade-in" id="contact-title"></h2>
  <div class="contact-grid" id="contact-grid"></div>
  <p class="contact-note" id="contact-note"></p>
</section>


<footer id="footer-text"></footer>


<!-- ============================================================
  🔧 RENDER ENGINE — 双语渲染引擎
  ============================================================
  - currentLang: 当前语言，'en' 或 'zh'
  - toggleLang(): 切换语言
  - render(lang): 读取 CONFIG[lang]，重建所有 DOM
  ⚠️  以下代码一般不需要修改
============================================================ -->
<script>
let currentLang = 'en';

// ── 小工具 ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const make = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};
const clear = id => { const el = $(id); while(el.firstChild) el.removeChild(el.firstChild); };

// ── 语言切换 ─────────────────────────────────────────────────
function toggleLang() {
  currentLang = currentLang === 'en' ? 'zh' : 'en';
  // 淡出 → 重渲染 → 淡入
  document.body.classList.add('lang-fade','switching');
  setTimeout(() => {
    render(currentLang);
    document.documentElement.lang = CONFIG[currentLang].htmlLang;
    document.body.classList.remove('switching');
  }, 250);
}

// ── 主渲染函数 ───────────────────────────────────────────────
function render(lang) {
  const L = CONFIG[lang];   // 当前语言数据
  const G = CONFIG;         // 语言无关数据

  // NAV
  $('nav-logo').textContent = '// ' + L.nameShort;
  clear('nav-links');
  const navAnchors = ['home','about','skills','projects','resume','contact'];
  L.nav.forEach((text, i) => {
    const li = make('li');
    const a  = make('a', null, text);
    a.href = '#' + navAnchors[i];
    li.appendChild(a);
    $('nav-links').appendChild(li);
  });
  $('lang-btn').textContent = lang === 'en' ? '中文' : 'EN';

  // ── ① Hero ─────────────────────────────────────────────────
  $('hero-eyebrow').textContent = L.heroEyebrow;
  const [first, ...rest] = L.name.split(/\s+/);
  $('hero-name').innerHTML = lang === 'en'
    ? `${first}<br/><span>${rest.join(' ')}.</span>`
    : `<span>${L.name}</span>`;
  $('hero-headline').innerHTML = L.heroHeadline;
  clear('hero-tags');
  L.heroTags.forEach(t => {
    $('hero-tags').appendChild(make('span', `tag tag-${t.color}`, t.text));
  });

  // ── ② About ────────────────────────────────────────────────
  $('about-label').textContent = L.aboutLabel;
  $('about-title').innerHTML   = L.aboutTitle;
  clear('about-bio');
  L.aboutBio.forEach(p => $('about-bio').appendChild(make('p','about-bio',p)));
  clear('about-strengths');
  L.strengths.forEach(s => $('about-strengths').appendChild(make('li',null,s)));
  $('edu-label').textContent  = L.eduLabel;
  $('lang-label').textContent = L.langLabel;
  clear('about-education');
  L.education.forEach(edu => {
    $('about-education').appendChild(make('div','edu-card',
      `<div class="edu-school">${edu.school}</div>
       <div class="edu-degree">${edu.degree}</div>
       <div class="edu-period">${edu.period}</div>`));
  });
  $('about-languages').innerHTML =
    L.languages.map(l => `<div class="edu-degree">${l}</div>`).join('<br/>');

  // ── ③ Skills ───────────────────────────────────────────────
  $('skills-label').textContent  = L.skillsLabel;
  $('skills-title').innerHTML    = L.skillsTitle;
  clear('skills-grid');
  L.skillCategories.forEach(cat => {
    $('skills-grid').appendChild(make('div','skill-category fade-in',
      `<div class="skill-cat-label">${cat.label}</div>` +
      cat.items.map(i =>
        `<div class="skill-item"><span>${i}</span><span class="skill-dot"></span></div>`
      ).join('')));
  });

  // ── ④ Projects ─────────────────────────────────────────────
  $('projects-label').textContent = L.projectsLabel;
  $('projects-title').innerHTML   = L.projectsTitle;
  clear('projects-grid');
  L.projects.forEach(p => {
    const card = make('div', `project-card fade-in${p.featured ? ' featured' : ''}`);
    const fl   = L.projectFieldLabels;

    const secHTML = [
      ['problem',      fl.problem],
      ['data',         fl.data],
      ['approach',     fl.approach],
      ['outcome',      fl.outcome],
      ['contribution', fl.contribution],
    ].filter(([k]) => p[k])
     .map(([k, label]) =>
       `<div class="project-section">
          <div class="proj-sec-title">${label}</div>
          <p>${p[k]}</p>
        </div>`).join('');

    const techHTML = p.tech.map(t => `<span class="tech-pill">${t}</span>`).join('');
    const linkHTML = p.link ? `<a class="proj-link" href="${p.link}" target="_blank">↗ GitHub</a>` : '';
    const inner    = p.featured ? `<div class="feat-grid">${secHTML}</div>` : secHTML;

    card.innerHTML = `
      <div class="project-type">${p.type}</div>
      <div class="project-title">${p.title}</div>
      <div class="project-period">${p.period}</div>
      ${inner}
      <div class="project-tech-row">${techHTML}${linkHTML}</div>`;
    $('projects-grid').appendChild(card);
  });

  // ── ⑤ Resume ───────────────────────────────────────────────
  $('resume-label').textContent = L.resumeLabel;
  $('resume-title').innerHTML   = L.resumeTitle;
  clear('resume-blocks');
  const groups = {};
  L.experiences.forEach(exp => (groups[exp.section] = groups[exp.section] || []).push(exp));
  Object.entries(groups).forEach(([name, exps]) => {
    $('resume-blocks').appendChild(make('div','resume-block fade-in',
      `<div class="resume-block-hdr">${name}</div>` +
      exps.map(exp => `
        <div class="resume-entry">
          <div>
            <div class="resume-role">${exp.role}</div>
            <div class="resume-org">${exp.org}</div>
            <ul class="resume-buls">${exp.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
          </div>
          <div class="resume-period">${exp.period}</div>
        </div>`).join('')));
  });
  $('cv-btn').href        = G.cvLink;
  $('cv-btn').textContent = L.cvBtnText;
  $('cv-hint').innerHTML  = L.cvHint;

  // ── ⑥ Contact ──────────────────────────────────────────────
  $('contact-label').textContent = L.contactLabel;
  $('contact-title').innerHTML   = L.contactTitle;
  clear('contact-grid');
  const cl = L.contactLabels;
  const cards = [
    { label: cl.email,   val: `<a href="mailto:${G.email}">${G.email}</a>` },
    { label: cl.phone,   val: G.phone },
    { label: cl.github,  val: `<a href="${G.github}" target="_blank">${G.github.replace('https://','')}</a>` },
    G.linkedin
      ? { label: cl.linkedin, val: `<a href="${G.linkedin}" target="_blank">View Profile</a>` }
      : { label: cl.location, val: L.location },
  ];
  cards.forEach(c => {
    $('contact-grid').appendChild(make('div','contact-item',
      `<span class="contact-label">${c.label}</span>
       <span class="contact-value">${c.val}</span>`));
  });
  $('contact-note').innerHTML = L.contactNote;

  // Footer
  $('footer-text').textContent =
    `© ${new Date().getFullYear()} ${L.name} · Built with HTML/CSS/JS · Hosted on GitHub Pages`;

  // 重新注册 fade-in 观察器
  setTimeout(() => {
    document.querySelectorAll('.fade-in:not(.visible)').forEach(el => observer.observe(el));
  }, 50);
}

// ── IntersectionObserver（滚动淡入） ─────────────────────────
const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.08 }
);

// ── 导航高亮 ─────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  let cur = '';
  document.querySelectorAll('section[id]').forEach(s => {
    if (window.scrollY >= s.offsetTop - 200) cur = s.id;
  });
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.style.color = a.getAttribute('href') === '#' + cur ? 'var(--accent)' : '';
  });
});

// ── 初始渲染 ─────────────────────────────────────────────────
render('en');
</script>

</body>
</html>
